<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Eclipse - Mapa Interativo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --cyan: #03AED2;
            --orange: #F45B26;
            --bg: #0A0C0F;
            --text: #EEF0F3;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: var(--cyan);
            margin: 0;
        }

        /* O container do mapa precisa ter uma altura definida */
        #map {
            width: 90vw;
            height: 70vh;
            border: 2px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            margin-top: 20px;
        }
        
        /* Estilizando o pop-up do mapa para combinar com o tema */
        .leaflet-popup-content-wrapper {
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--orange);
        }
        .leaflet-popup-tip {
            background-color: var(--orange);
        }
    </style>
</head>
<body>

    <header>
        <h1>Descubra Natal</h1>
        <p>Explore, avalie e ganhe Pontos ESTRELA</p>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="mapa.js"></script>
</body>
</html>
