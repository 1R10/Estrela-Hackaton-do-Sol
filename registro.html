<section class="auth-section">
    <div class="auth-card">
        <h2>Junte-se ao <span class="hl-cyan">Eclipse</span></h2>
        <p>Ganhe pontos de estrela explorando Natal.</p>
        
        <form id="registroForm">
            <input type="text" placeholder="Nome Completo" required>
            <input type="email" placeholder="Seu melhor e-mail" required>
            <input type="password" placeholder="Senha" required>
            <input type="text" placeholder="CPF ou Passaporte" required>
            
            <div class="form-group">
                <input type="text" placeholder="Origem (Cidade/País)">
                <input type="text" placeholder="Como chegou? (Ex: Avião)">
            </div>
            
            <button type="submit" class="btn-hero">Criar Conta e Começar</button>
        </form>
    </div>
</section>
